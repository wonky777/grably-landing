<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Регистрация — GrabLy</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:'Inter',system-ui,sans-serif;background:#0f0f0f;color:#FAFAFA;line-height:1.6;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
:root{
  --accent:#7C3AED;--accent-h:#6D28D9;--accent-l:#A78BFA;
  --glow:rgba(124,58,237,.25);--glow-s:rgba(124,58,237,.45);
  --bg:#0f0f0f;--card:#1a1a1f;
  --border:rgba(255,255,255,.1);--border-s:rgba(255,255,255,.06);
  --t:#FAFAFA;--t2:#A1A1AA;--t3:#71717A;--t4:#3f3f46;
  --max:1180px;--ease:cubic-bezier(.16,1,.3,1);
}
.container{max-width:var(--max);margin:0 auto;padding:0 24px}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:center;background:rgba(15,15,15,.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border-s)}
.nav-in{max-width:var(--max);width:100%;display:flex;align-items:center;justify-content:space-between}
.nav-logo svg{height:28px;width:auto;display:block;filter:drop-shadow(0 0 12px rgba(120,75,192,.35))}
.nav-right{display:flex;align-items:center;gap:12px}
.btn-ghost{padding:9px 20px;border-radius:8px;font-size:14px;font-weight:600;color:var(--t2);transition:all .2s;border:1px solid transparent}
.btn-ghost:hover{color:var(--t);background:rgba(255,255,255,.04);border-color:var(--border)}
.btn-sm{padding:9px 22px;border-radius:8px;font-size:14px;font-weight:600;color:#fff;background:var(--accent);box-shadow:0 0 16px var(--glow);transition:all .25s;position:relative;overflow:hidden}
.btn-sm::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);animation:shm 3s ease-in-out infinite}
@keyframes shm{0%{left:-100%}50%{left:150%}100%{left:150%}}
.btn-sm:hover{background:var(--accent-h);box-shadow:0 0 28px var(--glow-s)}
.lang-sw{position:relative}
.lang-btn{background:transparent;border:1px solid transparent;border-radius:8px;padding:7px 9px;color:var(--t3);cursor:pointer;display:flex;align-items:center;transition:all .2s}
.lang-btn:hover{color:var(--t);background:rgba(255,255,255,.04);border-color:var(--border)}
.lang-dd{display:none;position:absolute;top:100%;right:0;margin-top:8px;background:rgba(18,18,22,.97);border:1px solid var(--border);border-radius:12px;min-width:160px;max-height:320px;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.6);backdrop-filter:blur(20px);z-index:200;padding:4px 0}
.lang-dd.open{display:block}
.lang-dd button{display:block;width:100%;text-align:left;padding:9px 16px;font-size:13px;color:var(--t2);background:transparent;border:none;cursor:pointer;font-family:inherit;transition:background .15s,color .15s}
.lang-dd button:hover{background:rgba(124,58,237,.1);color:var(--t)}
.lang-dd button.active{color:var(--accent-l);font-weight:600}
.profile-menu{position:relative}
.profile-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#A78BFA);color:#fff;font-weight:700;font-size:15px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.profile-avatar:hover{transform:scale(1.05)}
.profile-dd{position:absolute;top:calc(100% + 10px);right:0;background:#1a1a1f;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:8px;min-width:240px;display:none;z-index:1000;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.profile-dd.open{display:block}
.profile-hd{padding:14px 12px 12px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:6px}
.profile-em{font-size:13px;color:#A1A1AA;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.profile-bal{font-size:20px;font-weight:700;color:#7C3AED;margin-top:4px}
.profile-it{display:flex;align-items:center;padding:10px 12px;color:#FAFAFA;text-decoration:none;border-radius:8px;font-size:14px;gap:10px;transition:background .15s}
.profile-it:hover{background:rgba(124,58,237,.15)}

.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:80px 24px 40px}
.auth-card{width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;box-shadow:0 32px 64px rgba(0,0,0,.4)}
.auth-card h1{font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px;text-align:center}
.auth-sub{font-size:14px;color:var(--t2);text-align:center;margin-bottom:28px}
.auth-input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;color:var(--t);padding:13px 16px;font-size:14px;font-family:inherit;outline:none;margin-bottom:12px;transition:border-color .2s}
.auth-input:focus{border-color:var(--accent)}
.auth-input::placeholder{color:var(--t4)}
.pw-field{position:relative;margin-bottom:12px}
.pw-field .auth-input{margin-bottom:0;padding-right:44px}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:4px}
.eye-btn:hover{color:var(--t2)}
.auth-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:13px}
.auth-meta label{color:var(--t2);display:flex;align-items:center;gap:6px;cursor:pointer}
.auth-meta a{color:var(--accent-l);transition:color .2s}
.auth-meta a:hover{color:var(--accent)}
.auth-error{color:#EF4444;font-size:13px;min-height:20px;text-align:center;margin-bottom:8px}
.auth-success{color:#10B981;font-size:13px;text-align:center;padding:12px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.15);border-radius:10px;margin-bottom:12px}
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#6D28D9);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 0 20px var(--glow);transition:all .25s;position:relative;overflow:hidden}
.btn-primary::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);animation:shm 3s ease-in-out infinite}
.btn-primary:hover{box-shadow:0 0 32px var(--glow-s);transform:translateY(-1px)}
.auth-divider{text-align:center;color:var(--t4);font-size:12px;margin:20px 0;position:relative}
.auth-divider::before,.auth-divider::after{content:'';position:absolute;top:50%;width:calc(50% - 20px);height:1px;background:var(--border-s)}
.auth-divider::before{left:0}
.auth-divider::after{right:0}
.btn-secondary{display:block;width:100%;padding:13px;border:1px solid var(--border);border-radius:10px;color:var(--t2);font-size:14px;font-weight:600;text-align:center;transition:all .2s}
.btn-secondary:hover{border-color:var(--accent);color:var(--t);background:rgba(124,58,237,.06)}
.ref-toggle{margin-bottom:12px}
.ref-toggle a{color:var(--accent-l);font-size:13px}
.ref-toggle .auth-input{margin-top:8px}

.footer{padding:60px 0 40px;border-top:1px solid var(--border-s);background:rgba(255,255,255,.01)}
.footer-top{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;margin-bottom:40px}
.footer-brand svg{height:24px;width:auto;filter:drop-shadow(0 0 8px rgba(120,75,192,.2));margin-bottom:12px}
.footer-brand p{font-size:13px;color:var(--t3);max-width:240px;line-height:1.6}
.footer-col h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--t4);margin-bottom:14px}
.footer-col a{display:block;font-size:13px;color:var(--t3);padding:4px 0;transition:color .2s}
.footer-col a:hover{color:var(--accent-l)}
.footer-bottom{border-top:1px solid var(--border-s);padding-top:24px}
.footer-copy{font-size:12px;color:var(--t4)}
@media(max-width:768px){.footer-top{grid-template-columns:1fr}}

.reveal{opacity:0;transform:translateY(30px);transition:opacity .7s var(--ease),transform .7s var(--ease)}.reveal.visible{opacity:1;transform:none}
</style>
</head>

<main class="auth-page">
  <div class="auth-card reveal">
    <h1 data-i18n="reg_title">Создать аккаунт</h1>
    <p class="auth-sub" data-i18n="reg_sub">10 GC бесплатно после подтверждения email</p>
    <div class="auth-success" id="register-success" style="display:none"></div>
    <form id="register-form">
      <input type="email" class="auth-input" id="reg-email" placeholder="Email" data-i18n="reg_email" required>
      <div class="pw-field">
        <input type="password" class="auth-input" id="reg-password" placeholder="Пароль" data-i18n="reg_password" required>
        <button type="button" class="eye-btn" id="eye-toggle-1">&#128065;</button>
      </div>
      <div class="pw-field">
        <input type="password" class="auth-input" id="reg-confirm" placeholder="Подтвердите пароль" data-i18n="reg_password2" required>
        <button type="button" class="eye-btn" id="eye-toggle-2">&#128065;</button>
      </div>
      <div class="ref-toggle">
        <a href="#" id="ref-toggle-link" data-i18n="reg_ref">Есть реферальный код?</a>
        <input type="text" class="auth-input" id="ref-code" placeholder="Реферальный код" style="display:none">
      </div>
      <div class="auth-error" id="register-error"></div>
      <button type="submit" class="btn-primary" data-i18n="reg_btn">Создать аккаунт</button>
    </form>
    <div class="auth-divider" data-i18n="reg_or">Или</div>
    <a href="/login.html" class="btn-secondary" data-i18n="reg_login">Уже есть аккаунт</a>
  </div>
</main>

<script>
const API_URL = 'https://grably-server-production.up.railway.app';

// Reveal animation
document.querySelectorAll('.reveal').forEach(el => {
  const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { el.classList.add('visible'); obs.unobserve(el); } }, { threshold: 0.1 });
  obs.observe(el);
});

// Nav scroll
let lastScroll = 0;
window.addEventListener('scroll', () => {
  const nav = document.querySelector('.nav');
  const st = window.scrollY;
  nav.style.borderBottomColor = st > 10 ? 'rgba(255,255,255,.06)' : 'rgba(255,255,255,.03)';
  lastScroll = st;
});

// Lang switcher
const langToggle = document.getElementById('lang-toggle');
const langDd = document.getElementById('lang-dd');
if (langToggle && langDd) {
  langToggle.addEventListener('click', (e) => { e.stopPropagation(); langDd.classList.toggle('open'); });
  document.addEventListener('click', () => langDd.classList.remove('open'));
}

// Eye toggles
document.querySelectorAll('.eye-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const input = btn.parentElement.querySelector('.auth-input');
    input.type = input.type === 'password' ? 'text' : 'password';
  });
});

// Referral toggle
const refLink = document.getElementById('ref-toggle-link');
const refInput = document.getElementById('ref-code');
if (refLink && refInput) {
  refLink.addEventListener('click', (e) => {
    e.preventDefault();
    refInput.style.display = refInput.style.display === 'none' ? 'block' : 'none';
  });
}

// Register form
document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errorEl = document.getElementById('register-error');
  const successEl = document.getElementById('register-success');
  errorEl.textContent = '';
  successEl.style.display = 'none';

  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const confirm = document.getElementById('reg-confirm').value;
  const referral_code = document.getElementById('ref-code').value.trim();

  if (password.length < 6) {
    errorEl.textContent = 'Пароль должен содержать минимум 6 символов';
    return;
  }
  if (password !== confirm) {
    errorEl.textContent = 'Пароли не совпадают';
    return;
  }

  try {
    const body = { email, password, device_id: getOrCreateDeviceId() };
    if (referral_code) body.referral_code = referral_code;

    const res = await fetch(API_URL + '/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) {
      errorEl.textContent = data.detail || data.message || 'Ошибка регистрации';
      return;
    }
    document.getElementById('register-form').style.display = 'none';
    successEl.textContent = 'Проверьте email — мы отправили ссылку для подтверждения';
    successEl.style.display = 'block';
  } catch (err) {
    errorEl.textContent = 'Ошибка сети. Попробуйте позже.';
  }
});
</script>
